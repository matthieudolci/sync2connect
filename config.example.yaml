# sync2connect configuration.
#
# Copy to config.yaml (or mount at /data/config.yaml in Docker) and fill in
# your credentials. Every string value may reference an environment variable
# with ${VAR_NAME} to keep secrets out of the file.

# Directory where OAuth tokens and sync state are stored.
# Defaults to $SYNC2CONNECT_STATE_DIR, then ./data (in Docker: /data).
#state_dir: /data

sync:
  # How often to sync. Omit (or set to 0) to run a single pass and exit,
  # e.g. when scheduling with cron instead.
  interval: 1h

  # How far back the very first sync reaches. Defaults to 720h (30 days).
  #initial_lookback: 720h

  # Each route copies data from one source provider to one destination.
  routes:
    - source: withings
      destination: garmin

providers:
  withings:
    # Create an application at https://developer.withings.com to get these.
    client_id: ${WITHINGS_CLIENT_ID}
    client_secret: ${WITHINGS_CLIENT_SECRET}
    # Must exactly match the callback URL registered with your Withings app.
    # Withings allows http://localhost URLs only for apps in integration
    # mode (limited to 10 users) - which is fine for personal use. If your
    # app is switched to production mode, register an HTTPS URL on port 443
    # instead and authenticate with `auth withings --manual` (the page the
    # browser lands on may 404; paste the full redirect URL when prompted).
    #redirect_uri: http://localhost:8484/callback
    # Address the OAuth callback server listens on. Inside Docker this must
    # bind all interfaces so the published port can reach it.
    listen: 0.0.0.0:8484
    # When the sync loop starts without a stored token, print the
    # authorization URL in the logs and wait for the browser callback
    # instead of failing - no separate `auth withings` run needed. Open the
    # logged URL in a browser on the machine the callback port is published
    # on (see docker-compose.yml).
    auto_auth: true

  garmin:
    # Your Garmin Connect account. With these configured the app logs in by
    # itself whenever no stored token exists (and again when it expires
    # after ~1 year) - no `auth garmin` run needed. Accounts with MFA
    # enabled cannot log in headless: run `sync2connect auth garmin`
    # interactively once instead (the stored token is then reused).
    email: ${GARMIN_EMAIL}
    password: ${GARMIN_PASSWORD}
