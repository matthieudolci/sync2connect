services:
  sync2connect:
    image: ghcr.io/matthieudolci/sync2connect:latest
    container_name: sync2connect
    restart: unless-stopped
    environment:
      # Referenced from config.yaml via ${...}; define them in an .env file
      # next to this compose file or in your shell.
      WITHINGS_CLIENT_ID: ${WITHINGS_CLIENT_ID}
      WITHINGS_CLIENT_SECRET: ${WITHINGS_CLIENT_SECRET}
      GARMIN_EMAIL: ${GARMIN_EMAIL}
      GARMIN_PASSWORD: ${GARMIN_PASSWORD}
    volumes:
      # Must contain config.yaml; tokens and sync state are written here.
      - ./data:/data
